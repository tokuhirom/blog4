name: Publish Docker Image

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract GIT_HASH
        id: vars
        run: echo "GIT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/blog4:${{ env.GIT_HASH }}
          build-args: |
            GIT_HASH=${{ env.GIT_HASH }}

      - name: Deploy
        uses: ./.github/actions/deploy-apprun
        with:
          token_id: ${{ secrets.SACLOUD_API_TOKEN_ID }}
          token_secret: ${{ secrets.SAKURA_API_TOKEN_SECRET }}
          app_id: ${{ vars.APPRUN_APP_ID }}
          image: ghcr.io/${{ github.repository_owner }}/blog4:${{ env.GIT_HASH }}
